name: Check for New Rankings

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Check for new rankings
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python scripts/check_rankings.py
